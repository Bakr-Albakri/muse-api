<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muse">
<title>Muse</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTXVzZSIsInNob3J0X25hbWUiOiJNdXNlIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwYTBhMGEiLCJ0aGVtZV9jb2xvciI6IiMwYTBhMGEifQ==">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --surface3: #252525;
  --border: #2a2a2a;
  --text: #e8e4df;
  --text-dim: #7a756e;
  --accent: #c9a96e;
  --accent-glow: #c9a96e33;
  --red: #c46c5e;
  --green: #6ec49a;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Kufi Arabic', 'Space Mono', sans-serif;
  height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* === LAYOUT === */
.app {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* === HEADER === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  flex-shrink: 0;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  direction: ltr;
}

.logo span {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: 10px;
  padding: 4px;
}

.nav-tab {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.nav-tab.active {
  background: var(--surface3);
  color: var(--accent);
}

.nav-tab:hover:not(.active) {
  color: var(--text);
}

/* === SEARCH === */
.search-section {
  padding: 0 20px 16px;
  flex-shrink: 0;
}

.search-bar {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 16px;
  gap: 12px;
  transition: border-color 0.3s ease;
}

.search-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-bar svg {
  flex-shrink: 0;
  opacity: 0.4;
}

.search-bar input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 15px;
  padding: 14px 0;
  outline: none;
  direction: rtl;
}

.search-bar input::placeholder {
  color: var(--text-dim);
}

.search-bar .clear-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px;
  display: none;
  font-size: 18px;
}

.search-bar .clear-btn.visible {
  display: block;
}

/* === CONTENT === */
.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.tab-panel {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 0 20px 20px;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

.tab-panel.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* === RESULTS === */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  animation: card-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}

.result-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

@keyframes card-in {
  from { opacity: 0; transform: translateY(20px); }
}

.result-thumb {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: var(--surface2);
  overflow: hidden;
}

.result-thumb img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.result-duration {
  position: absolute;
  bottom: 8px;
  left: 8px;
  background: rgba(0,0,0,0.8);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 5px;
  direction: ltr;
}

.result-info {
  padding: 12px 14px;
}

.result-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
}

.result-channel {
  font-size: 11px;
  color: var(--text-dim);
}

.result-actions {
  display: flex;
  gap: 8px;
  padding: 0 14px 12px;
}

.action-btn {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 12px;
  padding: 9px 8px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s ease;
}

.action-btn:hover {
  background: var(--surface3);
  border-color: var(--accent);
}

.action-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  font-weight: 600;
}

.action-btn.primary:hover {
  background: #d4b578;
}

.action-btn svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* === PLAYER OVERLAY === */
.player-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  padding: 40px 20px;
}

.player-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.player-close {
  position: absolute;
  top: calc(var(--safe-top) + 16px);
  right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  z-index: 2;
}

.player-frame-wrap {
  width: 100%;
  max-width: 800px;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  background: #000;
}

.player-frame-wrap iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
  display: block;
}

.player-title {
  margin-top: 20px;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  max-width: 600px;
}

.player-actions {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

/* === LIBRARY === */
.library-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.library-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}

.library-count {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  direction: ltr;
}

.folder-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.folder-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.folder-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  font-weight: 600;
}

.folder-chip:hover:not(.active) {
  border-color: var(--accent);
  color: var(--text);
}

.add-folder-btn {
  background: none;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s ease;
}

.add-folder-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.song-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.song-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  background: var(--surface);
  border-radius: 10px;
  transition: all 0.2s ease;
  animation: card-in 0.3s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}

.song-item:hover {
  background: var(--surface2);
}

.song-thumb-small {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  background: var(--surface3);
  overflow: hidden;
  flex-shrink: 0;
}

.song-thumb-small img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.song-meta {
  flex: 1;
  min-width: 0;
}

.song-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-artist {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.song-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.icon-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.icon-btn.danger:hover {
  border-color: var(--red);
  color: var(--red);
}

/* === FOLDER MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 340px;
  max-width: 90vw;
  transform: scale(0.95);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}

.modal-overlay.active .modal {
  transform: scale(1);
}

.modal h3 {
  font-size: 16px;
  margin-bottom: 16px;
  color: var(--accent);
}

.modal input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 14px;
  padding: 12px 14px;
  border-radius: 10px;
  outline: none;
  direction: rtl;
  margin-bottom: 16px;
}

.modal input:focus {
  border-color: var(--accent);
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
}

.modal-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.modal-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0a;
  font-weight: 600;
}

/* === FOLDER SELECT MODAL === */
.folder-select-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
  max-height: 200px;
  overflow-y: auto;
}

.folder-select-item {
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s ease;
}

.folder-select-item:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* === LOADING === */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  gap: 8px;
}

.loading-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite;
}

.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* === EMPTY STATE === */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state svg {
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state p {
  font-size: 14px;
  line-height: 1.8;
}

/* === TOAST === */
.toast-container {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 20px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  padding: 12px 20px;
  border-radius: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: toast-in 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  white-space: nowrap;
}

.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(20px); }
}

/* === DOWNLOAD PROGRESS === */
.download-progress {
  position: relative;
  overflow: hidden;
}

.download-progress::after {
  content: '';
  position: absolute;
  bottom: 0;
  right: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  transform-origin: right;
  animation: progress-bar 3s ease-in-out;
}

@keyframes progress-bar {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

/* Responsive */
@media (max-width: 768px) {
  .results-grid {
    grid-template-columns: 1fr;
  }
}

@media (min-width: 1024px) {
  .results-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">MUSE<span></span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="search">بحث</button>
      <button class="nav-tab" data-tab="library">مكتبتي</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="ابحث عن أغنية أو فنان...">
      <button class="clear-btn" id="clearBtn">&times;</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Search Panel -->
    <div class="tab-panel active" id="searchPanel">
      <div id="searchResults"></div>
    </div>

    <!-- Library Panel -->
    <div class="tab-panel" id="libraryPanel">
      <div class="library-header">
        <div class="library-title">مكتبتي</div>
        <div class="library-count" id="libraryCount">0 songs</div>
      </div>
      <div class="folder-bar" id="folderBar"></div>
      <div class="song-list" id="songList"></div>
    </div>
  </div>
</div>

<!-- Player Overlay -->
<div class="player-overlay" id="playerOverlay">
  <button class="player-close" id="playerClose">&times;</button>
  <div class="player-frame-wrap">
    <iframe id="playerFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div class="player-title" id="playerTitle"></div>
  <div class="player-actions">
    <button class="action-btn primary" id="playerDownload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      حفظ الصوت
    </button>
  </div>
</div>

<!-- Folder Modal -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <h3>مجلد جديد</h3>
    <input type="text" id="folderNameInput" placeholder="اسم المجلد...">
    <div class="modal-actions">
      <button class="modal-btn primary" id="folderCreate">إنشاء</button>
      <button class="modal-btn" id="folderCancel">إلغاء</button>
    </div>
  </div>
</div>

<!-- Folder Select Modal -->
<div class="modal-overlay" id="folderSelectModal">
  <div class="modal">
    <h3>اختر مجلد</h3>
    <div class="folder-select-list" id="folderSelectList"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="folderSelectCancel">إلغاء</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// === MUSE API ===
// IMPORTANT: After deploying to Render, replace this URL with your Render service URL
const API_BASE = window.location.origin;
const API_KEY = 'muse_k9x7m2p4w8';

async function museAPI(path) {
  const url = API_BASE + path;
  const resp = await fetch(url, {
    headers: { 'X-Api-Key': API_KEY },
    signal: AbortSignal.timeout(30000)
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || 'خطأ في الخادم');
  }
  return await resp.json();
}

// === LOCAL STORAGE ===
function getLibrary() {
  try { return JSON.parse(localStorage.getItem('muse_library') || '[]'); }
  catch { return []; }
}

function saveLibrary(lib) {
  localStorage.setItem('muse_library', JSON.stringify(lib));
}

function getFolders() {
  try { return JSON.parse(localStorage.getItem('muse_folders') || '["الكل"]'); }
  catch { return ['الكل']; }
}

function saveFolders(f) {
  localStorage.setItem('muse_folders', JSON.stringify(f));
}

// === FORMAT TIME ===
function fmtTime(s) {
  if (!s) return '--:--';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// === TOAST ===
function showToast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; t.style.transition = 'all 0.3s ease'; }, 2500);
  setTimeout(() => t.remove(), 3000);
}

// === TAB SWITCHING ===
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
    if (tab.dataset.tab === 'library') renderLibrary();
  });
});

// === SEARCH ===
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
let searchTimeout;

searchInput.addEventListener('input', () => {
  clearBtn.classList.toggle('visible', searchInput.value.length > 0);
  clearTimeout(searchTimeout);
  if (searchInput.value.trim().length > 1) {
    searchTimeout = setTimeout(() => doSearch(searchInput.value.trim()), 600);
  }
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    doSearch(searchInput.value.trim());
  }
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  document.getElementById('searchResults').innerHTML = '';
  searchInput.focus();
});

async function doSearch(query) {
  if (!query) return;
  const results = document.getElementById('searchResults');
  results.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';

  try {
    const data = await museAPI(`/search?q=${encodeURIComponent(query)}`);
    if (!data.length) {
      results.innerHTML = '<div class="empty-state"><p>لا توجد نتائج</p></div>';
      return;
    }

    results.innerHTML = '<div class="results-grid">' + data.slice(0, 12).map((v, i) => {
      const thumb = v.thumbnail || (v.thumbnails && v.thumbnails.length ? v.thumbnails[v.thumbnails.length - 1].url : `https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg`);
      return `
      <div class="result-card" style="animation-delay: ${i * 0.06}s">
        <div class="result-thumb" onclick="playVideo('${v.videoId}', '${escHTML(v.title)}')">
          <img src="${thumb}" loading="lazy" alt="">
          <div class="result-duration">${fmtTime(v.lengthSeconds)}</div>
        </div>
        <div class="result-info">
          <div class="result-title">${escHTML(v.title)}</div>
          <div class="result-channel">${escHTML(v.author || '')}</div>
        </div>
        <div class="result-actions">
          <button class="action-btn" onclick="playVideo('${v.videoId}', '${escHTML(v.title)}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            تشغيل
          </button>
          <button class="action-btn primary" onclick="downloadAudio('${v.videoId}', '${escHTML(v.title)}', '${escHTML(v.author || '')}', '${thumb}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            حفظ
          </button>
        </div>
      </div>`;
    }).join('') + '</div>';
  } catch(e) {
    results.innerHTML = `<div class="empty-state"><p>حدث خطأ: ${e.message}<br>حاول مرة أخرى</p></div>`;
  }
}

function escHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// === PLAY VIDEO ===
let currentVideoId = '';

function playVideo(id, title) {
  currentVideoId = id;
  const overlay = document.getElementById('playerOverlay');
  document.getElementById('playerFrame').src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
  document.getElementById('playerTitle').textContent = title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  overlay.classList.add('active');
}

document.getElementById('playerClose').addEventListener('click', () => {
  document.getElementById('playerOverlay').classList.remove('active');
  document.getElementById('playerFrame').src = '';
  currentVideoId = '';
});

document.getElementById('playerDownload').addEventListener('click', () => {
  if (currentVideoId) {
    const title = document.getElementById('playerTitle').textContent;
    downloadAudio(currentVideoId, title, '', '');
  }
});

// === DOWNLOAD AUDIO ===
async function downloadAudio(videoId, title, author, thumb) {
  showToast('جاري التحميل...', '');

  try {
    const data = await museAPI(`/audio/${videoId}`);

    if (!data.url) {
      showToast('رابط الصوت غير متاح', 'error');
      return;
    }

    // Save to library
    const lib = getLibrary();
    if (lib.some(s => s.videoId === videoId)) {
      showToast('موجود بالفعل في المكتبة', '');
      triggerFileDownload(data.url, data.title || title, 'audio/' + (data.ext || 'm4a'));
      return;
    }

    const cleanTitle = (data.title || title).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
    const cleanAuthor = (data.author || author).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");

    lib.push({
      videoId,
      title: cleanTitle,
      author: cleanAuthor,
      thumb: data.thumbnail || thumb || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
      audioUrl: data.url,
      audioType: 'audio/' + (data.ext || 'm4a'),
      folder: 'الكل',
      addedAt: Date.now()
    });

    saveLibrary(lib);
    showToast('تم الحفظ في المكتبة', 'success');

    // Trigger download as file
    triggerFileDownload(data.url, cleanTitle, 'audio/' + (data.ext || 'm4a'));

  } catch(e) {
    showToast('فشل التحميل: ' + e.message, 'error');
  }
}

function triggerFileDownload(url, title, mimeType) {
  const ext = mimeType.includes('mp4') || mimeType.includes('m4a') ? 'm4a'
            : mimeType.includes('webm') ? 'webm'
            : mimeType.includes('ogg') ? 'ogg' : 'm4a';

  const safeName = title.replace(/[^\w\u0600-\u06FF\s-]/g, '').trim().substring(0, 60);

  const a = document.createElement('a');
  a.href = url;
  a.download = `${safeName}.${ext}`;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// === LIBRARY ===
let activeFolder = 'الكل';

function renderLibrary() {
  const folders = getFolders();
  const lib = getLibrary();

  // Folder bar
  const folderBar = document.getElementById('folderBar');
  folderBar.innerHTML = folders.map(f =>
    `<button class="folder-chip ${f === activeFolder ? 'active' : ''}" onclick="setFolder('${escHTML(f)}')">${escHTML(f)}</button>`
  ).join('') + '<button class="add-folder-btn" onclick="openFolderModal()">+ مجلد جديد</button>';

  // Songs
  const filtered = activeFolder === 'الكل' ? lib : lib.filter(s => s.folder === activeFolder);
  document.getElementById('libraryCount').textContent = `${filtered.length} songs`;

  const songList = document.getElementById('songList');
  if (!filtered.length) {
    songList.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>لا توجد أغاني بعد<br>ابحث وحمّل أغانيك المفضلة</p></div>';
    return;
  }

  songList.innerHTML = filtered.map((s, i) => `
    <div class="song-item" style="animation-delay: ${i * 0.04}s">
      <div class="song-thumb-small">
        <img src="${s.thumb}" loading="lazy" alt="">
      </div>
      <div class="song-meta">
        <div class="song-name">${escHTML(s.title)}</div>
        <div class="song-artist">${escHTML(s.author)} · ${escHTML(s.folder)}</div>
      </div>
      <div class="song-actions">
        <button class="icon-btn" onclick="playVideo('${s.videoId}', '${escHTML(s.title)}')" title="تشغيل">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="icon-btn" onclick="redownloadSong('${s.videoId}')" title="تحميل">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn" onclick="moveSong('${s.videoId}')" title="نقل">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
        <button class="icon-btn danger" onclick="removeSong('${s.videoId}')" title="حذف">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function setFolder(f) {
  activeFolder = f;
  renderLibrary();
}

function removeSong(videoId) {
  const lib = getLibrary().filter(s => s.videoId !== videoId);
  saveLibrary(lib);
  renderLibrary();
  showToast('تم الحذف', '');
}

async function redownloadSong(videoId) {
  const lib = getLibrary();
  const song = lib.find(s => s.videoId === videoId);
  if (!song) return;

  try {
    const data = await museAPI(`/audio/${videoId}`);
    if (data.url) {
      triggerFileDownload(data.url, song.title, 'audio/' + (data.ext || 'm4a'));
      showToast('جاري التحميل...', '');
    } else {
      showToast('رابط غير متاح', 'error');
    }
  } catch(e) {
    showToast('فشل: ' + e.message, 'error');
  }
}

// === MOVE SONG TO FOLDER ===
let movingVideoId = '';

function moveSong(videoId) {
  movingVideoId = videoId;
  const folders = getFolders();
  const list = document.getElementById('folderSelectList');
  list.innerHTML = folders.map(f =>
    `<div class="folder-select-item" onclick="doMoveSong('${escHTML(f)}')">${escHTML(f)}</div>`
  ).join('');
  document.getElementById('folderSelectModal').classList.add('active');
}

function doMoveSong(folder) {
  const lib = getLibrary();
  const song = lib.find(s => s.videoId === movingVideoId);
  if (song) {
    song.folder = folder;
    saveLibrary(lib);
    renderLibrary();
    showToast(`تم النقل إلى "${folder}"`, 'success');
  }
  document.getElementById('folderSelectModal').classList.remove('active');
  movingVideoId = '';
}

document.getElementById('folderSelectCancel').addEventListener('click', () => {
  document.getElementById('folderSelectModal').classList.remove('active');
});

// === FOLDER MODAL ===
function openFolderModal() {
  document.getElementById('folderNameInput').value = '';
  document.getElementById('folderModal').classList.add('active');
  setTimeout(() => document.getElementById('folderNameInput').focus(), 300);
}

document.getElementById('folderCreate').addEventListener('click', () => {
  const name = document.getElementById('folderNameInput').value.trim();
  if (!name) return;
  const folders = getFolders();
  if (folders.includes(name)) {
    showToast('المجلد موجود بالفعل', 'error');
    return;
  }
  folders.push(name);
  saveFolders(folders);
  document.getElementById('folderModal').classList.remove('active');
  renderLibrary();
  showToast(`تم إنشاء "${name}"`, 'success');
});

document.getElementById('folderCancel').addEventListener('click', () => {
  document.getElementById('folderModal').classList.remove('active');
});

// Close modals on overlay click
['folderModal', 'folderSelectModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
  });
});

// === INIT ===
document.getElementById('searchResults').innerHTML = `
  <div class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <p>ابحث عن أي أغنية أو فنان<br>واحفظها في مكتبتك</p>
  </div>
`;

if ('serviceWorker' in navigator) {

  const swBlob = new Blob([swCode], { type: 'application/javascript' });

}
